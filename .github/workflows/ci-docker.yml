
name: CI Pipeline

on:
  push:
    branches:
      -

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/education-platform-app

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run dist

  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Clean Docker space
        run: docker system prune -af || true

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -f docker/Dockerfile.prod -t $IMAGE_NAME:${{ github.ref_name }} .
          docker tag $IMAGE_NAME:${{ github.ref_name }} $IMAGE_NAME:${{ github.sha }}

      - name: Push Docker Image
        run: |
          docker push $IMAGE_NAME:${{ github.ref_name }}
          docker push $IMAGE_NAME:${{ github.sha }}
